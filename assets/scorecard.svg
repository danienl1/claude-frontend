<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Frontend scorecard</title>
  <desc id="desc">Weighted scorecard for frontend quality</desc>
  <rect width="1400" height="520" fill="#ffffff"/>
  <text x="700" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">Frontend Quality Scorecard</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <rect x="130" y="110" width="1140" height="320" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <g font-weight="800" fill="#0f172a">
      <text x="190" y="158">Category</text>
      <text x="760" y="158">Weight</text>
      <text x="940" y="158">Pass Signal</text>
    </g>
    <g fill="#334155">
      <text x="190" y="208">Design system and originality</text><text x="790" y="208">15%</text><text x="940" y="208">Specific, consistent, non-generic</text>
      <text x="190" y="250">Accessibility and semantics</text><text x="790" y="250">15%</text><text x="940" y="250">Keyboard, labels, WCAG AA</text>
      <text x="190" y="292">Component and state architecture</text><text x="790" y="292">15%</text><text x="940" y="292">Clear data, error, empty states</text>
      <text x="190" y="334">Browser validation</text><text x="790" y="334">15%</text><text x="940" y="334">Screenshots and workflows pass</text>
      <text x="190" y="376">Responsive, performance, product, integration</text><text x="790" y="376">40%</text><text x="940" y="376">No overflow, fast, useful, shippable</text>
    </g>
    <line x1="170" y1="178" x2="1230" y2="178" stroke="#cbd5e1"/>
    <line x1="170" y1="222" x2="1230" y2="222" stroke="#e2e8f0"/>
    <line x1="170" y1="264" x2="1230" y2="264" stroke="#e2e8f0"/>
    <line x1="170" y1="306" x2="1230" y2="306" stroke="#e2e8f0"/>
    <line x1="170" y1="348" x2="1230" y2="348" stroke="#e2e8f0"/>
  </g>
  <text x="700" y="474" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Grade A = ship-ready UI. Grade C or below = visible quality or validation gaps remain.</text>
</svg>
