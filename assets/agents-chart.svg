<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">8 frontend specialist agents</title>
  <desc id="desc">Parallel frontend specialist agents for product, design, architecture, accessibility, responsiveness, performance, validation, and integration</desc>
  <rect width="1400" height="520" fill="#f8fafc"/>
  <text x="700" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">8 Parallel Frontend Specialists</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <g transform="translate(80 110)"><rect width="280" height="120" rx="14" fill="#dbeafe" stroke="#2563eb"/><text x="24" y="42" fill="#1e3a8a">1. Product UX</text><text x="24" y="76" fill="#1e40af" font-size="14">Intent, flows, IA, copy</text></g>
    <g transform="translate(400 110)"><rect width="280" height="120" rx="14" fill="#dcfce7" stroke="#16a34a"/><text x="24" y="42" fill="#14532d">2. Design System</text><text x="24" y="76" fill="#166534" font-size="14">Tokens, originality, polish</text></g>
    <g transform="translate(720 110)"><rect width="280" height="120" rx="14" fill="#fef3c7" stroke="#d97706"/><text x="24" y="42" fill="#78350f">3. Components</text><text x="24" y="76" fill="#92400e" font-size="14">State, data, architecture</text></g>
    <g transform="translate(1040 110)"><rect width="280" height="120" rx="14" fill="#ede9fe" stroke="#7c3aed"/><text x="24" y="42" fill="#4c1d95">4. Accessibility</text><text x="24" y="76" fill="#5b21b6" font-size="14">WCAG, keyboard, ARIA</text></g>
    <g transform="translate(80 290)"><rect width="280" height="120" rx="14" fill="#ccfbf1" stroke="#0f766e"/><text x="24" y="42" fill="#134e4a">5. Responsive</text><text x="24" y="76" fill="#115e59" font-size="14">Mobile, overflow, reflow</text></g>
    <g transform="translate(400 290)"><rect width="280" height="120" rx="14" fill="#ffedd5" stroke="#ea580c"/><text x="24" y="42" fill="#7c2d12">6. Performance SEO</text><text x="24" y="76" fill="#9a3412" font-size="14">Vitals, bundle, metadata</text></g>
    <g transform="translate(720 290)"><rect width="280" height="120" rx="14" fill="#e0f2fe" stroke="#0284c7"/><text x="24" y="42" fill="#0c4a6e">7. Browser QA</text><text x="24" y="76" fill="#075985" font-size="14">Playwright, screenshots, console</text></g>
    <g transform="translate(1040 290)"><rect width="280" height="120" rx="14" fill="#f1f5f9" stroke="#475569"/><text x="24" y="42" fill="#0f172a">8. Integration</text><text x="24" y="76" fill="#334155" font-size="14">Build, lint, API contracts</text></g>
  </g>
  <text x="700" y="468" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Gather context -> dispatch specialists -> aggregate score -> implement or report</text>
</svg>
